<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>System Health Dashboard</title>
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >
    <style>
        .metric-green { color: #28a745; font-weight: bold; }
        .metric-yellow { color: #ffc107; font-weight: bold; }
        .metric-red { color: #dc3545; font-weight: bold; }
        .last-updated { font-size: 0.9rem; color: #6c757d; text-align: right; }
    </style>
    <script>
        function formatUptime(seconds) {
            const d = Math.floor(seconds / (3600*24));
            const h = Math.floor((seconds % (3600*24)) / 3600);
            const m = Math.floor((seconds % 3600) / 60);
            const s = seconds % 60;
            return `${d}d ${h}h ${m}m ${s}s`;
        }

        function colorizeMetric(value, elementId) {
            const el = document.getElementById(elementId);
            if (value < 50) el.className = 'metric-green';
            else if (value < 75) el.className = 'metric-yellow';
            else el.className = 'metric-red';
        }

        async function fetchMetrics() {
            try {
                const response = await fetch("/metrics");
                const data = await response.json();

                const now = new Date();
                document.getElementById("last_updated").innerText =
                    "Last Updated: " + now.toLocaleTimeString();

                // CPU
                document.getElementById("cpu").innerText = data.cpu.percent + "%";
                colorizeMetric(data.cpu.percent, "cpu");
                document.getElementById("cpu_cores").innerText = data.cpu.cores;

                // Memory
                document.getElementById("memory").innerText =
                    data.memory.percent + "% (" +
                    data.memory.used_gb + " / " +
                    data.memory.total_gb + " GB)";
                colorizeMetric(data.memory.percent, "memory");
                document.getElementById("ram_total").innerText =
                    data.memory.total_gb + " GB";

                // Disk
                document.getElementById("disk").innerText =
                    data.disk.percent + "% (" +
                    data.disk.used_gb + " / " +
                    data.disk.total_gb + " GB)";
                colorizeMetric(data.disk.percent, "disk");
                document.getElementById("disk_free").innerText =
                    data.disk.free_gb + " GB";

                // System Info
                document.getElementById("hostname").innerText = data.system.hostname;
                document.getElementById("platform").innerText = data.system.platform;
                document.getElementById("uptime").innerText =
                    formatUptime(data.system.uptime_seconds);

            } catch (error) {
                console.error("Metric fetch failed:", error);
            }
        }

        setInterval(fetchMetrics, {{ refresh_interval * 1000 }});
        window.onload = fetchMetrics;
    </script>
</head>
<body class="bg-light">
<div class="container py-4">
    <h2 class="mb-4 text-center">System Health Telemetry Dashboard</h2>
    <div class="last-updated" id="last_updated">Last Updated: --:--:--</div>

    <div class="row g-4">
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>CPU Usage</h5>
                    <p id="cpu">Loading...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>CPU Cores</h5>
                    <p id="cpu_cores">Loading...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Memory Usage</h5>
                    <p id="memory">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <div class="row g-4 mt-2">
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Disk Usage</h5>
                    <p id="disk">Loading...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Disk Free</h5>
                    <p id="disk_free">Loading...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>RAM Total</h5>
                    <p id="ram_total">Loading...</p>
                </div>
            </div>
        </div>
    </div>

    <hr class="my-4">

    <div class="row g-4">
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Hostname</h5>
                    <p id="hostname">Loading...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Platform</h5>
                    <p id="platform">Loading...</p>
                </div>
            </div>
        </div>
        <div class="col-md-4 col-sm-6">
            <div class="card shadow-sm">
                <div class="card-body">
                    <h5>Uptime</h5>
                    <p id="uptime">Loading...</p>
                </div>
            </div>
        </div>
    </div>

</div>
</body>
</html>
